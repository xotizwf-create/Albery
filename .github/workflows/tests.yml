name: tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: albery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/albery_test
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      FLASK_SECRET_KEY: test-secret-key
      MCP_SHARED_SECRET: test-mcp-secret
      MCP_FAQ_SHARED_SECRET: test-faq-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Apply schema + migrations
        run: python scripts/ensure_postgres.py
      - name: Run tests (incl. DB-marked)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Интерфейс
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run lint
      - name: Build
        run: npm run build
