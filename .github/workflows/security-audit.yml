name: Security audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "Интерфейс/package-lock.json"

      - name: Frontend dependency audit
        working-directory: "Интерфейс"
        run: |
          npm ci
          npm audit --omit=dev
