# IP и неизвестные хосты на HTTP → www.m4s.ru
server {
    listen 80 default_server;
    server_name _;
    return 301 https://www.m4s.ru$request_uri;
}

# HTTPS default (IP / неизвестный SNI) → www.m4s.ru
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/m4s.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m4s.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.m4s.ru$request_uri;
}

# Голый m4s.ru → www.m4s.ru
server {
    listen 443 ssl;
    server_name m4s.ru;
    ssl_certificate /etc/letsencrypt/live/m4s.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m4s.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.m4s.ru$request_uri;
}

# Основное приложение
server {
    listen 443 ssl;
    server_name www.m4s.ru;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    ssl_certificate /etc/letsencrypt/live/m4s.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m4s.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# MCP endpoint
